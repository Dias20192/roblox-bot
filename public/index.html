<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leaderboards</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0c10;
      --surface: #111520;
      --border: #1e2535;
      --accent-kills: #e74c3c;
      --accent-robux: #f5d442;
      --text: #e8eaf0;
      --muted: #5a6070;
      --gold: #f5d442;
      --silver: #b0b8c8;
      --bronze: #cd7f32;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      padding: 40px 20px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 10%, rgba(231,76,60,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(245,212,66,0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .container { max-width: 1200px; margin: 0 auto; position: relative; z-index: 1; }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    header h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #e74c3c 0%, #f5a623 50%, #f5d442 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      font-family: 'Share Tech Mono', monospace;
      color: var(--muted);
      font-size: 0.8rem;
      margin-top: 8px;
      letter-spacing: 0.05em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .board {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.5s forwards;
    }
    .board:nth-child(1) { animation-delay: 0.05s; }
    .board:nth-child(2) { animation-delay: 0.15s; }
    .board:nth-child(3) { animation-delay: 0.25s; }
    .board:nth-child(4) { animation-delay: 0.35s; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .board-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .board-title {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .board[data-unit="kills"] .board-title { color: var(--accent-kills); }
    .board[data-unit="robux"] .board-title { color: var(--accent-robux); }

    .board-updated {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
    }

    .entries { padding: 8px 0; }

    .entry {
      display: grid;
      grid-template-columns: 36px 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      transition: background 0.15s;
    }

    .entry:hover { background: rgba(255,255,255,0.03); }

    .rank {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem;
      text-align: center;
      font-weight: bold;
    }

    .rank.r1 { color: var(--gold); font-size: 1.2rem; }
    .rank.r2 { color: var(--silver); font-size: 1.1rem; }
    .rank.r3 { color: var(--bronze); font-size: 1rem; }
    .rank.rn { color: var(--muted); }

    .username {
      font-size: 1rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }

    .score {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem;
      white-space: nowrap;
    }

    .board[data-unit="kills"] .score { color: #e87060; }
    .board[data-unit="robux"] .score { color: #f5d442; }

    .empty {
      padding: 32px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      font-family: 'Share Tech Mono', monospace;
    }

    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 200px;
      gap: 8px;
      color: var(--muted);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem;
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent-kills);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; background: #f5a623; }
    .dot:nth-child(3) { animation-delay: 0.4s; background: var(--accent-robux); }

    @keyframes pulse {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    footer {
      text-align: center;
      margin-top: 48px;
      font-family: 'Share Tech Mono', monospace;
      color: var(--muted);
      font-size: 0.7rem;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Leaderboards</h1>
      <p id="refresh-info">LOADING...</p>
    </header>
    <div class="grid" id="grid">
      <div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>
    <footer>AUTO-REFRESHES EVERY 60 SECONDS &nbsp;·&nbsp; DATA PUSHED FROM ROBLOX EVERY 5 MINUTES</footer>
  </div>

  <script>
    const ENDPOINT_ORDER = [
      "/update-leaderboard1",
      "/update-leaderboard2",
      "/update-leaderboard3",
      "/update-leaderboard4",
    ];

    const RANK_ICONS = ["🥇", "🥈", "🥉"];

    function rankClass(i) {
      return ["r1","r2","r3"][i] ?? "rn";
    }

    function formatScore(score, unit) {
      const n = Number(score).toLocaleString();
      return unit === "robux" ? `${n} R$` : `${n} kills`;
    }

    function timeAgo(iso) {
      if (!iso) return "never";
      const diff = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
      if (diff < 60) return `${diff}s ago`;
      if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
      return `${Math.floor(diff/3600)}h ago`;
    }

    function renderBoard(ep, data) {
      const unit = data.entries[0]?.unit ?? (ep.includes("3") || ep.includes("4") ? "robux" : "kills");
      const entries = data.entries;

      const rows = entries.length === 0
        ? `<div class="empty">// NO DATA YET</div>`
        : entries.map((e, i) => `
          <div class="entry">
            <span class="rank ${rankClass(i)}">${RANK_ICONS[i] ?? (i+1)}</span>
            <span class="username">${e.username}</span>
            <span class="score">${formatScore(e.score, e.unit ?? unit)}</span>
          </div>
        `).join("");

      return `
        <div class="board" data-unit="${unit}">
          <div class="board-header">
            <span class="board-title">${data.title}</span>
            <span class="board-updated">${timeAgo(data.updatedAt)}</span>
          </div>
          <div class="entries">${rows}</div>
        </div>
      `;
    }

    async function load() {
      const grid = document.getElementById("grid");
      const info = document.getElementById("refresh-info");
      try {
        const res = await fetch("/api/leaderboards");
        const data = await res.json();
        grid.innerHTML = ENDPOINT_ORDER.map(ep => renderBoard(ep, data[ep])).join("");
        info.textContent = `LAST FETCHED: ${new Date().toLocaleTimeString()}`;
      } catch {
        grid.innerHTML = `<div class="loading" style="color:#e74c3c">FAILED TO LOAD DATA</div>`;
      }
    }

    load();
    setInterval(load, 60_000);
  </script>
</body>
</html>
